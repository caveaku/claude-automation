name: Terraform Drift Detection

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:

env:
  TF_VERSION: '1.9.6'
  TF_WORKING_DIR: './terraform'
  AWS_REGION: 'us-east-1'

permissions:
  contents: read
  issues: write

jobs:
  drift:
    name: Detect Drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform Plan (drift check)
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -detailed-exitcode -no-color 2>&1 | tee drift.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Open issue if drift detected
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const drift = fs.readFileSync('${{ env.TF_WORKING_DIR }}/drift.txt', 'utf8');
            const maxLen = 60000;
            const body = `## Infrastructure Drift Detected

            The scheduled drift check found differences between Terraform state and actual AWS resources.

            <details><summary>Plan Output</summary>

            \`\`\`
            ${drift.substring(0, maxLen)}
            \`\`\`

            </details>

            **Action required:** Review the diff above and either:
            - Run the \`apply\` workflow to reconcile drift, or
            - Update the Terraform code to reflect intentional changes.

            *Auto-detected on ${new Date().toISOString()}*`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Drift] Infrastructure drift detected — ${new Date().toISOString().slice(0,10)}`,
              body,
              labels: ['infrastructure', 'drift']
            });
